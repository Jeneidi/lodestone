name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]   # primary; extend to ["3.10", "3.11", "3.12"] post-wave-1

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install project with dev extras
        run: pip install -e ".[dev]"

      # ---------------------------------------------------------------------------
      # Linting
      # ---------------------------------------------------------------------------

      - name: Run ruff linter
        run: ruff check src/ evals/ tests/

      - name: Check ruff formatting
        run: ruff format --check src/ evals/ tests/

      # ---------------------------------------------------------------------------
      # Tests
      # Notes:
      # - Tests are designed to be 100% offline-friendly (no model downloads,
      #   no API calls) — heavy models are mocked in fixtures (wave 2+).
      # - LODESTONE_GENERATION_ENABLED is explicitly false so no API key is needed.
      # ---------------------------------------------------------------------------

      - name: Run pytest
        env:
          LODESTONE_GENERATION_ENABLED: "false"
        run: pytest -q

      # ---------------------------------------------------------------------------
      # (Optional) Upload coverage report as artifact
      # ---------------------------------------------------------------------------

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
        continue-on-error: true   # don't fail if coverage report wasn't generated
